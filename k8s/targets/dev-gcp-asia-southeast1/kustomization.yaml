apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../providers/gcp
patches:
  - path: ingress-host-patch.yaml
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: portfolio
        namespace: portfolio
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: portfolio
        namespace: portfolio
      spec:
        template:
          spec:
            containers:
              - name: portfolio
                resources:
                  requests:
                    memory: "32Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "250m"
images:
  - name: ltyang/portfolio
    newName: ltyang/portfolio
    newTag: latest
