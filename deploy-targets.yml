# deploy-targets.yml
# Single source of truth for all deployment targets.
# Run `python scripts/generate-targets.py` after editing to regenerate
# Terraform and K8s target files.
#
# Derived values (from target name):
#   cluster_name   → portfolio-{target-name}  (e.g. portfolio-prod-azure-eastus)
#   resource_group → portfolio-rg-{target-name} (Azure only)
#   registry       → ecr (AWS) or dockerhub (Azure)

targets:
  - name: prod-azure-eastus
    enabled: true
    provider: azure
    region: eastus
    github_environment: production
    dns_subdomain: ""
    replicas: 2
    resources:
      cpu_request: 100m
      cpu_limit: 500m
      memory_request: 64Mi
      memory_limit: 256Mi
    trigger:
      branches: [release/*]
      tags: [v*]

  - name: prod-aws-us-east-1
    enabled: true
    provider: aws
    region: us-east-1
    github_environment: production
    dns_subdomain: aws
    replicas: 2
    resources:
      cpu_request: 100m
      cpu_limit: 500m
      memory_request: 64Mi
      memory_limit: 256Mi
    trigger:
      branches: [release/*]
      tags: [v*]

  - name: dev-aws-us-east-1
    enabled: true
    provider: aws
    region: us-east-1
    github_environment: "non-prod"
    dns_subdomain: dev-aws
    replicas: 1
    resources:
      cpu_request: 50m
      cpu_limit: 250m
      memory_request: 32Mi
      memory_limit: 128Mi
    trigger:
      branches: [main]
