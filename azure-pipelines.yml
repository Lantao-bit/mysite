# Azure DevOps CI/CD Pipeline
# Triggers on push to main branch
# Builds Docker image, pushes to Docker Hub, deploys to AKS

trigger:
  branches:
    include:
      - main

variables:
  dockerHubUser: 'ltyang'
  imageName: 'ltyang/portfolio'
  imageTag: '$(Build.BuildId)'
  namespace: 'portfolio'

stages:
  # ── Stage 0: Test ───────────────────────────────────────────────────
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: RunTests
        displayName: 'Install dependencies and run pytest'
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Install dependencies'
            inputs:
              targetType: inline
              script: |
                set -ex
                python3 -m pip install --upgrade pip
                python3 -m pip install -r portfolio/requirements.txt

          - task: Bash@3
            displayName: 'Run test suite'
            inputs:
              targetType: inline
              script: |
                set -ex
                python3 -m pytest tests/ -v --tb=short

  # ── Stage 1: Terraform Plan ────────────────────────────────────────────
  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    dependsOn: Test
    jobs:
      - job: Plan
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Terraform Init & Plan'
            inputs:
              targetType: inline
              script: |
                set -ex
                cd terraform
                terraform init -input=false
                terraform plan -input=false -out=tfplan
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
          - publish: terraform/tfplan
            artifact: tfplan

  # ── Stage 2: Terraform Apply ─────────────────────────────────────────
  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - job: Apply
        pool:
          name: 'Default'
        steps:
          - download: current
            artifact: tfplan
          - task: Bash@3
            displayName: 'Terraform Apply'
            inputs:
              targetType: inline
              script: |
                set -ex
                cd terraform
                terraform init -input=false
                terraform apply -input=false $(Pipeline.Workspace)/tfplan/tfplan
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

  # ── Stage 3: Infrastructure Setup (Ingress + cert-manager) ────────────
  - stage: InfraSetup
    displayName: 'Setup Ingress & cert-manager'
    dependsOn: TerraformApply
    jobs:
      - job: SetupIngress
        displayName: 'Install ingress-nginx and cert-manager via Helm'
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Get AKS credentials'
            inputs:
              targetType: inline
              script: |
                set -ex
                az aks get-credentials --resource-group portfolio-rg --name portfolio-aks --overwrite-existing --admin
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - task: Bash@3
            displayName: 'Get static IP from Terraform output'
            inputs:
              targetType: inline
              script: |
                set -ex
                cd terraform
                terraform init -input=false
                STATIC_IP=$(terraform output -raw ingress_public_ip)
                echo "Static IP: $STATIC_IP"
                echo "##vso[task.setvariable variable=INGRESS_STATIC_IP]$STATIC_IP"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - task: Bash@3
            displayName: 'Install NGINX Ingress Controller'
            inputs:
              targetType: inline
              script: |
                set -ex
                helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
                helm repo update
                helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
                  --namespace ingress-nginx \
                  --create-namespace \
                  --set controller.replicaCount=1 \
                  --set controller.service.loadBalancerIP=$(INGRESS_STATIC_IP) \
                  --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-resource-group"=portfolio-rg \
                  --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz

          - task: Bash@3
            displayName: 'Install cert-manager'
            inputs:
              targetType: inline
              script: |
                set -ex
                helm repo add jetstack https://charts.jetstack.io
                helm repo update
                helm upgrade --install cert-manager jetstack/cert-manager \
                  --namespace cert-manager \
                  --create-namespace \
                  --set crds.enabled=true

          - task: Bash@3
            displayName: 'Wait for cert-manager webhook'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl -n cert-manager wait --for=condition=available deployment/cert-manager-webhook --timeout=120s

          - task: Bash@3
            displayName: 'Apply ClusterIssuers and Ingress'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/ingress/cert-manager-issuer.yaml
                kubectl apply -f k8s/ingress/ingress.yaml

          - task: Bash@3
            displayName: 'Print ingress external IP'
            inputs:
              targetType: inline
              script: |
                echo "============================================"
                echo "  Ingress Static IP: $(INGRESS_STATIC_IP)"
                echo "  Domain: https://orchidpay.io"
                echo "============================================"

  # ── Stage 4: Build and Push ──────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: InfraSetup
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker image and push to Docker Hub'
        pool:
          name: 'Default'   # vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              command: login
              containerRegistry: 'dockerhub-connection'

          - task: Bash@3
            displayName: 'Build and push image (linux/amd64)'
            inputs:
              targetType: inline
              script: |
                set -ex
                export HOME=/Users/yanglantao
                # Call docker-buildx plugin directly
                BUILDX=$HOME/.docker/cli-plugins/docker-buildx
                echo "Buildx version:"
                $BUILDX version
                # Build and push
                $BUILDX build \
                  --platform linux/amd64 \
                  --push \
                  -t $(imageName):$(imageTag) \
                  -t $(imageName):latest \
                  -f $(Build.SourcesDirectory)/Dockerfile \
                  $(Build.SourcesDirectory)

  # ── Stage 4: Deploy to AKS ──────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn: Build
    jobs:
      - job: DeployToAKS
        displayName: 'Apply manifests to AKS'
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Replace image tag in manifest'
            inputs:
              targetType: inline
              script: |
                sed -i'' -e "s/__IMAGE_TAG__/$(imageTag)/g" k8s/deployment.yaml
                cat k8s/deployment.yaml

          - task: Bash@3
            displayName: 'Get AKS credentials'
            inputs:
              targetType: inline
              script: |
                set -ex
                az aks get-credentials --resource-group portfolio-rg --name portfolio-aks --overwrite-existing --admin
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - task: Bash@3
            displayName: 'Apply namespace'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/namespace.yaml

          - task: Bash@3
            displayName: 'Create Docker Hub pull secret'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl create secret docker-registry dockerhub-creds \
                  --namespace portfolio \
                  --docker-server=https://index.docker.io/v1/ \
                  --docker-username=$(DOCKERHUB_USERNAME) \
                  --docker-password=$(DOCKERHUB_TOKEN) \
                  --dry-run=client -o yaml | kubectl apply -f -
            env:
              DOCKERHUB_USERNAME: $(DOCKERHUB_USERNAME)
              DOCKERHUB_TOKEN: $(DOCKERHUB_TOKEN)

          - task: Bash@3
            displayName: 'Apply secret'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/secret.yaml

          - task: Bash@3
            displayName: 'Apply PVC'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/pvc.yaml

          - task: Bash@3
            displayName: 'Apply deployment'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/deployment.yaml

          - task: Bash@3
            displayName: 'Apply service'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/service.yaml

          - task: Bash@3
            displayName: 'Check rollout status'
            continueOnError: true
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl rollout status deployment/portfolio -n portfolio --timeout=180s
