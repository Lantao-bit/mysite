# Azure DevOps CI/CD Pipeline
# Triggers on push to main branch
# Builds Docker image, pushes to Docker Hub, deploys to AKS

trigger:
  branches:
    include:
      - main

variables:
  dockerHubUser: 'ltyang'
  imageName: 'ltyang/portfolio'
  imageTag: '$(Build.BuildId)'
  namespace: 'portfolio'

stages:
  # ── Stage 0: Test ───────────────────────────────────────────────────
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: RunTests
        displayName: 'Install dependencies and run pytest'
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Install dependencies'
            inputs:
              targetType: inline
              script: |
                set -ex
                python3 -m pip install --upgrade pip
                python3 -m pip install -r portfolio/requirements.txt

          - task: Bash@3
            displayName: 'Run test suite'
            inputs:
              targetType: inline
              script: |
                set -ex
                python3 -m pytest tests/ -v --tb=short \
                  --cov=portfolio \
                  --cov-report=term-missing \
                  --cov-report=xml:coverage.xml \
                  --cov-fail-under=80

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            inputs:
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'

  # ── Stage 1: Terraform Plan ────────────────────────────────────────────
  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    dependsOn: Test
    jobs:
      - job: Plan
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Terraform Init & Plan'
            inputs:
              targetType: inline
              script: |
                set -ex
                cd terraform
                terraform init -input=false
                terraform plan -input=false -out=tfplan
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
          - publish: terraform/tfplan
            artifact: tfplan

  # ── Stage 2: Terraform Apply ─────────────────────────────────────────
  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - job: Apply
        pool:
          name: 'Default'
        steps:
          - download: current
            artifact: tfplan
          - task: Bash@3
            displayName: 'Terraform Apply'
            inputs:
              targetType: inline
              script: |
                set -ex
                cd terraform
                terraform init -input=false
                terraform apply -input=false $(Pipeline.Workspace)/tfplan/tfplan
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

  # ── Stage 3: Infrastructure Setup (Ingress + cert-manager + Cloudflare DNS) ──
  - stage: InfraSetup
    displayName: 'Setup Ingress & cert-manager'
    dependsOn: TerraformApply
    jobs:
      - job: SetupIngress
        displayName: 'Install ingress-nginx, cert-manager, update Cloudflare DNS'
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Get AKS credentials'
            inputs:
              targetType: inline
              script: |
                set -ex
                az aks get-credentials --resource-group portfolio-rg --name portfolio-aks --overwrite-existing --admin
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - task: Bash@3
            displayName: 'Install NGINX Ingress Controller'
            inputs:
              targetType: inline
              script: |
                set -ex
                helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
                helm repo update
                helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
                  --namespace ingress-nginx \
                  --create-namespace \
                  --set controller.replicaCount=1 \
                  --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz

          - task: Bash@3
            displayName: 'Wait for ingress external IP'
            inputs:
              targetType: inline
              script: |
                set -ex
                echo "Waiting for external IP assignment..."
                for i in $(seq 1 30); do
                  IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
                  if [ -n "$IP" ] && [ "$IP" != "" ]; then
                    echo "External IP: $IP"
                    echo "##vso[task.setvariable variable=INGRESS_IP]$IP"
                    exit 0
                  fi
                  echo "  Attempt $i/30 - IP not ready yet..."
                  sleep 10
                done
                echo "ERROR: Timed out waiting for external IP"
                exit 1

          - task: Bash@3
            displayName: 'Update Cloudflare DNS'
            inputs:
              targetType: inline
              script: |
                set -ex
                ZONE_ID="$(CLOUDFLARE_ZONE_ID)"
                IP="$(INGRESS_IP)"
                echo "Updating Cloudflare DNS for orchidflow.io -> $IP"

                # Update or create A record for @ (root domain)
                ROOT_RECORD_ID=$(curl -s -X GET \
                  "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=orchidflow.io" \
                  -H "Authorization: Bearer $(CLOUDFLARE_API_TOKEN)" \
                  -H "Content-Type: application/json" | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')")

                if [ -n "$ROOT_RECORD_ID" ]; then
                  echo "Updating existing root A record..."
                  curl -s -X PUT \
                    "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$ROOT_RECORD_ID" \
                    -H "Authorization: Bearer $(CLOUDFLARE_API_TOKEN)" \
                    -H "Content-Type: application/json" \
                    --data "{\"type\":\"A\",\"name\":\"orchidflow.io\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"
                else
                  echo "Creating root A record..."
                  curl -s -X POST \
                    "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
                    -H "Authorization: Bearer $(CLOUDFLARE_API_TOKEN)" \
                    -H "Content-Type: application/json" \
                    --data "{\"type\":\"A\",\"name\":\"orchidflow.io\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"
                fi

                # Update or create A record for www
                WWW_RECORD_ID=$(curl -s -X GET \
                  "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=www.orchidflow.io" \
                  -H "Authorization: Bearer $(CLOUDFLARE_API_TOKEN)" \
                  -H "Content-Type: application/json" | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')")

                if [ -n "$WWW_RECORD_ID" ]; then
                  echo "Updating existing www A record..."
                  curl -s -X PUT \
                    "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$WWW_RECORD_ID" \
                    -H "Authorization: Bearer $(CLOUDFLARE_API_TOKEN)" \
                    -H "Content-Type: application/json" \
                    --data "{\"type\":\"A\",\"name\":\"www.orchidflow.io\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"
                else
                  echo "Creating www A record..."
                  curl -s -X POST \
                    "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
                    -H "Authorization: Bearer $(CLOUDFLARE_API_TOKEN)" \
                    -H "Content-Type: application/json" \
                    --data "{\"type\":\"A\",\"name\":\"www.orchidflow.io\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"
                fi

                echo ""
                echo "DNS updated: orchidflow.io -> $IP"
                echo "DNS updated: www.orchidflow.io -> $IP"
            env:
              CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
              CLOUDFLARE_ZONE_ID: $(CLOUDFLARE_ZONE_ID)

          - task: Bash@3
            displayName: 'Install cert-manager'
            inputs:
              targetType: inline
              script: |
                set -ex
                helm repo add jetstack https://charts.jetstack.io
                helm repo update
                # Remove conflicting webhook config if it exists (AKS admissionsenforcer conflict)
                kubectl delete validatingwebhookconfiguration cert-manager-webhook --ignore-not-found
                helm upgrade --install cert-manager jetstack/cert-manager \
                  --namespace cert-manager \
                  --create-namespace \
                  --set crds.enabled=true \
                  --set global.leaderElection.namespace=cert-manager

          - task: Bash@3
            displayName: 'Wait for cert-manager webhook'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl -n cert-manager wait --for=condition=available deployment/cert-manager-webhook --timeout=120s

          - task: Bash@3
            displayName: 'Apply ClusterIssuers and Ingress'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/ingress/cert-manager-issuer.yaml
                kubectl apply -f k8s/namespace.yaml
                kubectl apply -f k8s/ingress/ingress.yaml

          - task: Bash@3
            displayName: 'Print summary'
            inputs:
              targetType: inline
              script: |
                echo "============================================"
                echo "  Ingress IP: $(INGRESS_IP)"
                echo "  Domain: https://orchidflow.io"
                echo "  Cloudflare DNS: Updated automatically"
                echo "============================================"

  # ── Stage 4: Build and Push ──────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: InfraSetup
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker image and push to Docker Hub'
        pool:
          name: 'Default'   # vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              command: login
              containerRegistry: 'dockerhub-connection'

          - task: Bash@3
            displayName: 'Build and push image (linux/amd64)'
            inputs:
              targetType: inline
              script: |
                set -ex
                export HOME=/Users/yanglantao
                # Call docker-buildx plugin directly
                BUILDX=$HOME/.docker/cli-plugins/docker-buildx
                echo "Buildx version:"
                $BUILDX version
                # Build and push
                $BUILDX build \
                  --platform linux/amd64 \
                  --push \
                  -t $(imageName):$(imageTag) \
                  -t $(imageName):latest \
                  -f $(Build.SourcesDirectory)/Dockerfile \
                  $(Build.SourcesDirectory)

  # ── Stage 4: Deploy to AKS ──────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn: Build
    jobs:
      - job: DeployToAKS
        displayName: 'Apply manifests to AKS'
        pool:
          name: 'Default'
        steps:
          - task: Bash@3
            displayName: 'Replace image tag in manifest'
            inputs:
              targetType: inline
              script: |
                sed -i'' -e "s/__IMAGE_TAG__/$(imageTag)/g" k8s/deployment.yaml
                cat k8s/deployment.yaml

          - task: Bash@3
            displayName: 'Get AKS credentials'
            inputs:
              targetType: inline
              script: |
                set -ex
                az aks get-credentials --resource-group portfolio-rg --name portfolio-aks --overwrite-existing --admin
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - task: Bash@3
            displayName: 'Apply namespace'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/namespace.yaml

          - task: Bash@3
            displayName: 'Create Docker Hub pull secret'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl create secret docker-registry dockerhub-creds \
                  --namespace portfolio \
                  --docker-server=https://index.docker.io/v1/ \
                  --docker-username=$(DOCKERHUB_USERNAME) \
                  --docker-password=$(DOCKERHUB_TOKEN) \
                  --dry-run=client -o yaml | kubectl apply -f -
            env:
              DOCKERHUB_USERNAME: $(DOCKERHUB_USERNAME)
              DOCKERHUB_TOKEN: $(DOCKERHUB_TOKEN)

          - task: Bash@3
            displayName: 'Apply secret'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/secret.yaml

          - task: Bash@3
            displayName: 'Apply PVC'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/pvc.yaml

          - task: Bash@3
            displayName: 'Apply deployment'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/deployment.yaml

          - task: Bash@3
            displayName: 'Apply service'
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl apply -f k8s/service.yaml

          - task: Bash@3
            displayName: 'Check rollout status'
            continueOnError: true
            inputs:
              targetType: inline
              script: |
                set -ex
                kubectl rollout status deployment/portfolio -n portfolio --timeout=180s
