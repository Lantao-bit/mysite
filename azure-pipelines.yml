# Azure DevOps CI/CD Pipeline
# Triggers on push to main branch
# Builds Docker image, pushes to Docker Hub, deploys to AKS

trigger:
  branches:
    include:
      - main

variables:
  dockerHubUser: 'ltyang'
  imageName: 'ltyang/portfolio'
  imageTag: '$(Build.BuildId)'
  kubernetesServiceConnection: 'aks-portfolio-connection'
  namespace: 'portfolio'

stages:
  # ── Stage 1: Build and Push ──────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Push Image'
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker image and push to Docker Hub'
        pool:
          name: 'Default'   # vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              command: login
              containerRegistry: 'dockerhub-connection'

          - task: Bash@3
            displayName: 'Build and push image (linux/amd64)'
            inputs:
              targetType: inline
              script: |
                docker buildx use desktop-linux
                docker buildx build \
                  --platform linux/amd64 \
                  --push \
                  -t $(imageName):$(imageTag) \
                  -t $(imageName):latest \
                  -f $(Build.SourcesDirectory)/Dockerfile \
                  $(Build.SourcesDirectory)

  # ── Stage 2: Deploy to AKS ──────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn: Build
    jobs:
      - job: DeployToAKS
        displayName: 'Apply manifests to AKS'
        pool:
          name: 'Default'   # vmImage: 'ubuntu-latest'
        steps:
          - task: Bash@3
            displayName: 'Replace image tag in manifest'
            inputs:
              targetType: inline
              script: |
                sed -i'' -e "s/__IMAGE_TAG__/$(imageTag)/g" k8s/deployment.yaml
                cat k8s/deployment.yaml

          - task: Kubernetes@1
            displayName: 'Apply namespace'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
              command: apply
              arguments: '-f k8s/namespace.yaml'

          - task: Kubernetes@1
            displayName: 'Apply secret'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
              command: apply
              arguments: '-f k8s/secret.yaml'

          - task: Kubernetes@1
            displayName: 'Apply PVC'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
              command: apply
              arguments: '-f k8s/pvc.yaml'

          - task: Kubernetes@1
            displayName: 'Apply deployment'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
              command: apply
              arguments: '-f k8s/deployment.yaml'

          - task: Kubernetes@1
            displayName: 'Apply service'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
              command: apply
              arguments: '-f k8s/service.yaml'

          - task: Kubernetes@1
            displayName: 'Check rollout status'
            continueOnError: true
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
              command: 'rollout'
              arguments: 'status deployment/portfolio -n $(namespace) --timeout=180s'
