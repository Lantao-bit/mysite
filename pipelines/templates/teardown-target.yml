# pipelines/templates/teardown-target.yml
# Per-target teardown template for Azure DevOps pipelines.
# Tears down a single target's infrastructure independently.
# Idempotent: succeeds even if infrastructure doesn't exist.

parameters:
  - name: target
    type: object
  - name: preserve_ecr
    type: boolean
    default: true

jobs:
  - job: Teardown_${{ replace(parameters.target.name, '-', '_') }}
    displayName: 'Teardown ${{ parameters.target.name }}'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      # Step 1: Validate target exists in deploy-targets.yml
      - script: |
          set -euo pipefail
          echo "Validating target '${{ parameters.target.name }}' exists in deploy-targets.yml..."

          TARGET_NAME="${{ parameters.target.name }}"
          RESULT=$(python pipelines/scripts/parse-targets.py --target-list "$TARGET_NAME" 2>&1) || {
            echo "##[error]Target '$TARGET_NAME' not found in deploy-targets.yml"
            echo "$RESULT"
            exit 1
          }

          echo "Target '$TARGET_NAME' validated successfully."
          echo "$RESULT"
        displayName: 'Validate target exists'

      # Step 2: Set up provider-specific credentials
      - script: |
          set -euo pipefail
          PROVIDER="${{ parameters.target.provider }}"
          echo "Setting up credentials for provider: $PROVIDER"

          if [ "$PROVIDER" = "aws" ]; then
            if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${AWS_REGION:-}" ]; then
              echo "##[error]Missing required AWS credentials. Ensure AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION are set."
              exit 1
            fi
            echo "AWS credentials validated."
          elif [ "$PROVIDER" = "azure" ]; then
            if [ -z "${ARM_CLIENT_ID:-}" ] || [ -z "${ARM_CLIENT_SECRET:-}" ] || [ -z "${ARM_SUBSCRIPTION_ID:-}" ] || [ -z "${ARM_TENANT_ID:-}" ]; then
              echo "##[error]Missing required Azure credentials. Ensure ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_SUBSCRIPTION_ID, and ARM_TENANT_ID are set."
              exit 1
            fi
            echo "Azure credentials validated."
          else
            echo "##[error]Unknown provider: $PROVIDER"
            exit 1
          fi
        displayName: 'Validate credentials'
        env:
          AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
          AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
          AWS_REGION: $(AWS_REGION)
          ARM_CLIENT_ID: $(ARM_CLIENT_ID)
          ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
          ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
          ARM_TENANT_ID: $(ARM_TENANT_ID)

      # Step 3: Remove Cloudflare DNS record for this target
      - script: |
          set -euo pipefail
          echo "Removing Cloudflare DNS record for target '${{ parameters.target.name }}'..."

          SUBDOMAIN="${{ parameters.target.dns.subdomain }}"
          ZONE_ID="$CLOUDFLARE_ZONE_ID"
          API_TOKEN="$CLOUDFLARE_API_TOKEN"
          DOMAIN="orchidflow.io"

          # Validate Cloudflare credentials
          if [ -z "$ZONE_ID" ] || [ -z "$API_TOKEN" ]; then
            echo "##[warning]Cloudflare credentials not set. Skipping DNS cleanup."
            exit 0
          fi

          # Determine the full record name
          if [ -z "$SUBDOMAIN" ]; then
            RECORD_NAME="$DOMAIN"
          else
            RECORD_NAME="${SUBDOMAIN}.${DOMAIN}"
          fi

          echo "Looking up DNS record: $RECORD_NAME"

          # GET the record ID by name
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${RECORD_NAME}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "##[warning]Failed to query Cloudflare DNS (HTTP $HTTP_CODE). Continuing anyway (idempotent)."
            echo "$BODY"
            exit 0
          fi

          # Check if any records exist
          RECORD_COUNT=$(echo "$BODY" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data.get('result', [])))" 2>/dev/null || echo "0")

          if [ "$RECORD_COUNT" = "0" ]; then
            echo "No DNS record found for '$RECORD_NAME'. Nothing to remove (idempotent)."
            exit 0
          fi

          # Delete each matching record
          RECORD_IDS=$(echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for record in data.get('result', []):
              print(record['id'])
          ")

          for RECORD_ID in $RECORD_IDS; do
            echo "Deleting DNS record ID: $RECORD_ID"
            DEL_RESPONSE=$(curl -s -w "\n%{http_code}" -X DELETE \
              -H "Authorization: Bearer $API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}")

            DEL_CODE=$(echo "$DEL_RESPONSE" | tail -n1)
            DEL_BODY=$(echo "$DEL_RESPONSE" | sed '$d')

            if [ "$DEL_CODE" = "200" ]; then
              echo "Successfully deleted DNS record $RECORD_ID"
            else
              echo "##[warning]Failed to delete DNS record $RECORD_ID (HTTP $DEL_CODE). Continuing (idempotent)."
              echo "$DEL_BODY"
            fi
          done

          echo "DNS cleanup complete for '$RECORD_NAME'."
        displayName: 'Remove Cloudflare DNS record'
        env:
          CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
          CLOUDFLARE_ZONE_ID: $(CLOUDFLARE_ZONE_ID)

      # Step 4: Install Terraform
      - script: |
          set -euo pipefail
          echo "Installing Terraform..."
          wget -qO- https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip | busybox unzip -d /usr/local/bin - 2>/dev/null || {
            curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o /tmp/terraform.zip
            unzip -o /tmp/terraform.zip -d /usr/local/bin
            rm /tmp/terraform.zip
          }
          terraform --version
        displayName: 'Install Terraform'

      # Step 5: Terraform destroy
      - script: |
          set -euo pipefail
          TARGET_NAME="${{ parameters.target.name }}"
          PROVIDER="${{ parameters.target.provider }}"
          TARGET_DIR="infra/targets/${TARGET_NAME}"

          echo "Running terraform destroy for target '$TARGET_NAME' in '$TARGET_DIR'..."

          # Verify target directory exists
          if [ ! -d "$TARGET_DIR" ]; then
            echo "##[warning]Target directory '$TARGET_DIR' does not exist. Nothing to destroy (idempotent)."
            exit 0
          fi

          cd "$TARGET_DIR"

          # Terraform init
          echo "Initializing Terraform..."
          terraform init -input=false

          # Handle ECR preservation for AWS targets
          if [ "$PROVIDER" = "aws" ]; then
            PRESERVE_ECR="${{ parameters.preserve_ecr }}"

            if [ "$PRESERVE_ECR" = "True" ] || [ "$PRESERVE_ECR" = "true" ]; then
              echo "Preserving ECR repository during teardown."
              echo "Running terraform destroy excluding ECR resources..."

              # Get list of resources in state
              RESOURCES=$(terraform state list 2>/dev/null || echo "")

              if [ -z "$RESOURCES" ]; then
                echo "No resources found in Terraform state. Nothing to destroy (idempotent)."
                exit 0
              fi

              # Build -target flags for all resources EXCEPT ECR-related ones
              # ECR resources typically match: module.aws.aws_ecr_*
              TARGET_FLAGS=""
              while IFS= read -r resource; do
                if echo "$resource" | grep -qi "ecr"; then
                  echo "Skipping ECR resource: $resource"
                else
                  TARGET_FLAGS="$TARGET_FLAGS -target=$resource"
                fi
              done <<< "$RESOURCES"

              if [ -z "$TARGET_FLAGS" ]; then
                echo "All resources are ECR-related. Nothing to destroy."
                exit 0
              fi

              # shellcheck disable=SC2086
              terraform destroy -auto-approve -input=false $TARGET_FLAGS
            else
              echo "Destroying ALL resources including ECR..."
              terraform destroy -auto-approve -input=false
            fi
          else
            # Non-AWS targets: destroy everything
            # State backend resources (Azure storage account) are NOT managed by the module,
            # so they survive destroy automatically.
            echo "Running terraform destroy..."
            terraform destroy -auto-approve -input=false
          fi

          echo "Terraform destroy complete for '$TARGET_NAME'."
        displayName: 'Terraform destroy'
        env:
          # AWS credentials
          AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
          AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
          AWS_REGION: $(AWS_REGION)
          # Azure credentials
          ARM_CLIENT_ID: $(ARM_CLIENT_ID)
          ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
          ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
          ARM_TENANT_ID: $(ARM_TENANT_ID)

      # Step 6: Report teardown status
      - script: |
          echo "Teardown complete for target '${{ parameters.target.name }}'."
          echo "  Provider: ${{ parameters.target.provider }}"
          echo "  Region: ${{ parameters.target.region }}"
          echo "  Environment: ${{ parameters.target.environment }}"
          echo "  Preserve ECR: ${{ parameters.preserve_ecr }}"
          echo ""
          echo "Note: State backend resources (S3 bucket/DynamoDB for AWS, Azure storage for Azure)"
          echo "have been preserved. Re-provisioning via the deploy pipeline will work cleanly."
        displayName: 'Report teardown status'
